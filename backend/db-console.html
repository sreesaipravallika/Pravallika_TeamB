<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickServ SQL Console</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: #252526;
            padding: 20px 30px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #007acc;
        }

        .header h1 {
            color: #007acc;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            color: #858585;
            font-size: 14px;
        }

        .layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
            height: calc(100vh - 140px);
        }

        .sidebar {
            background: #252526;
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar h3 {
            color: #007acc;
            font-size: 14px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .table-list {
            list-style: none;
        }

        .table-item {
            padding: 10px;
            margin-bottom: 5px;
            background: #1e1e1e;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .table-item:hover {
            background: #007acc;
            color: white;
        }

        .table-item.active {
            background: #007acc;
            color: white;
        }

        .main-panel {
            background: #252526;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .query-editor {
            padding: 20px;
            border-bottom: 1px solid #3e3e42;
        }

        .query-editor h3 {
            color: #007acc;
            font-size: 16px;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            color: #d4d4d4;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 15px;
        }

        textarea:focus {
            outline: none;
            border-color: #007acc;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #007acc;
            color: white;
        }

        .btn-primary:hover {
            background: #005a9e;
        }

        .btn-secondary {
            background: #3e3e42;
            color: #d4d4d4;
        }

        .btn-secondary:hover {
            background: #505050;
        }

        .results-panel {
            flex: 1;
            padding: 20px;
            overflow: auto;
        }

        .status {
            padding: 10px 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .status.success {
            background: #1e3a1e;
            color: #4ec9b0;
            border: 1px solid #4ec9b0;
        }

        .status.error {
            background: #3a1e1e;
            color: #f48771;
            border: 1px solid #f48771;
        }

        .status.info {
            background: #1e2a3a;
            color: #569cd6;
            border: 1px solid #569cd6;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            background: #1e1e1e;
            border-radius: 4px;
            overflow: hidden;
        }

        th {
            background: #007acc;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #3e3e42;
            color: #d4d4d4;
        }

        tr:hover {
            background: #2a2a2a;
        }

        .quick-queries {
            margin-top: 20px;
        }

        .quick-query-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 8px 10px;
            margin-bottom: 5px;
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            color: #d4d4d4;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .quick-query-btn:hover {
            background: #007acc;
            color: white;
            border-color: #007acc;
        }

        .schema-info {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .schema-info h4 {
            color: #4ec9b0;
            margin-bottom: 10px;
        }

        .column-list {
            list-style: none;
        }

        .column-item {
            padding: 5px 0;
            color: #858585;
        }

        .column-name {
            color: #9cdcfe;
            font-weight: 600;
        }

        .column-type {
            color: #4ec9b0;
        }

        @media (max-width: 1024px) {
            .layout {
                grid-template-columns: 1fr;
            }
            .sidebar {
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ QuickServ SQL Console</h1>
            <p>Execute SQL queries directly on your database</p>
        </div>

        <div class="layout">
            <!-- Sidebar -->
            <div class="sidebar">
                <h3>📊 Tables</h3>
                <ul class="table-list" id="tableList">
                    <li class="table-item" onclick="loadTable('users')">👥 users</li>
                    <li class="table-item" onclick="loadTable('bookings')">📅 bookings</li>
                </ul>

                <div class="quick-queries">
                    <h3>⚡ Quick Queries</h3>
                    <button class="quick-query-btn" onclick="setQuery('SELECT * FROM users;')">
                        All Users
                    </button>
                    <button class="quick-query-btn" onclick="setQuery('SELECT * FROM users WHERE role = \\'customer\\';')">
                        All Customers
                    </button>
                    <button class="quick-query-btn" onclick="setQuery('SELECT * FROM users WHERE role = \\'provider\\';')">
                        All Providers
                    </button>
                    <button class="quick-query-btn" onclick="setQuery('SELECT * FROM bookings;')">
                        All Bookings
                    </button>
                    <button class="quick-query-btn" onclick="setQuery('SELECT * FROM bookings WHERE status = \\'PENDING\\';')">
                        Pending Bookings
                    </button>
                    <button class="quick-query-btn" onclick="setQuery('SELECT COUNT(*) as total FROM users;')">
                        Count Users
                    </button>
                    <button class="quick-query-btn" onclick="setQuery('SELECT COUNT(*) as total FROM bookings;')">
                        Count Bookings
                    </button>
                    <button class="quick-query-btn" onclick="setQuery('SELECT b.*, u.name as customer_name FROM bookings b JOIN users u ON b.customer_id = u.id;')">
                        Bookings with Customer Names
                    </button>
                </div>
            </div>

            <!-- Main Panel -->
            <div class="main-panel">
                <div class="query-editor">
                    <h3>💻 SQL Query Editor</h3>
                    <textarea id="queryInput" placeholder="Enter your SQL query here...

Examples:
SELECT * FROM users;
SELECT * FROM bookings WHERE status = 'PENDING';
INSERT INTO users (name, email, password, role) VALUES ('John', 'john@example.com', 'hash', 'customer');
UPDATE bookings SET status = 'CONFIRMED' WHERE id = 1;
DELETE FROM bookings WHERE id = 1;"></textarea>
                    
                    <div class="button-group">
                        <button class="btn-primary" onclick="executeQuery()">▶️ Execute Query</button>
                        <button class="btn-secondary" onclick="clearQuery()">🗑️ Clear</button>
                        <button class="btn-secondary" onclick="loadSchema()">📋 Show Schema</button>
                        <button class="btn-secondary" onclick="exportResults()">📥 Export CSV</button>
                    </div>
                </div>

                <div class="results-panel">
                    <div id="statusMessage"></div>
                    <div id="results"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function setQuery(query) {
            document.getElementById('queryInput').value = query;
        }

        function clearQuery() {
            document.getElementById('queryInput').value = '';
            document.getElementById('results').innerHTML = '';
            document.getElementById('statusMessage').innerHTML = '';
        }

        async function executeQuery() {
            const query = document.getElementById('queryInput').value.trim();
            
            if (!query) {
                showStatus('Please enter a query', 'error');
                return;
            }

            try {
                const response = await fetch('http://localhost:8080/api/database/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                const data = await response.json();

                if (data.success) {
                    if (data.results) {
                        displayResults(data.results);
                        showStatus(`✅ Query executed successfully. ${data.rowCount} row(s) returned.`, 'success');
                    } else {
                        document.getElementById('results').innerHTML = '';
                        showStatus(`✅ ${data.message}. ${data.changes || 0} row(s) affected.`, 'success');
                    }
                } else {
                    showStatus(`❌ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
            }
        }

        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            
            if (!data || data.length === 0) {
                resultsDiv.innerHTML = '<p style="padding: 20px; text-align: center; color: #858585;">No results found</p>';
                return;
            }

            const keys = Object.keys(data[0]);
            
            let html = '<table><thead><tr>';
            keys.forEach(key => {
                html += `<th>${key}</th>`;
            });
            html += '</tr></thead><tbody>';

            data.forEach(row => {
                html += '<tr>';
                keys.forEach(key => {
                    let value = row[key];
                    if (value === null) value = '<em style="color: #858585;">NULL</em>';
                    if (typeof value === 'object') value = JSON.stringify(value);
                    html += `<td>${value}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            resultsDiv.innerHTML = html;
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
        }

        async function loadTable(tableName) {
            setQuery(`SELECT * FROM ${tableName};`);
            executeQuery();
            
            // Highlight active table
            document.querySelectorAll('.table-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        async function loadSchema() {
            try {
                const response = await fetch('http://localhost:8080/api/database/schema');
                const schema = await response.json();
                
                let html = '';
                for (const [tableName, columns] of Object.entries(schema)) {
                    html += `<div class="schema-info">`;
                    html += `<h4>📋 ${tableName}</h4>`;
                    html += `<ul class="column-list">`;
                    columns.forEach(col => {
                        html += `<li class="column-item">`;
                        html += `<span class="column-name">${col.name}</span> `;
                        html += `<span class="column-type">${col.type}</span>`;
                        if (col.pk) html += ` <span style="color: #f48771;">PRIMARY KEY</span>`;
                        if (col.notnull) html += ` <span style="color: #ce9178;">NOT NULL</span>`;
                        html += `</li>`;
                    });
                    html += `</ul></div>`;
                }
                
                document.getElementById('results').innerHTML = html;
                showStatus('Database schema loaded', 'info');
            } catch (error) {
                showStatus(`Error loading schema: ${error.message}`, 'error');
            }
        }

        function exportResults() {
            const table = document.querySelector('#results table');
            
            if (!table) {
                showStatus('No results to export', 'error');
                return;
            }

            let csv = [];
            const rows = table.querySelectorAll('tr');
            
            rows.forEach(row => {
                const cols = row.querySelectorAll('td, th');
                const csvRow = [];
                cols.forEach(col => {
                    let text = col.textContent;
                    if (text.includes(',')) text = `"${text}"`;
                    csvRow.push(text);
                });
                csv.push(csvRow.join(','));
            });

            const csvContent = csv.join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'query-results.csv';
            a.click();
            
            showStatus('Results exported successfully', 'success');
        }

        // Load schema on page load
        window.onload = () => {
            loadSchema();
        };
    </script>
</body>
</html>
