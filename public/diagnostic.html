<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickServ Diagnostic</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #00ff00;
        }
        .test { margin: 10px 0; padding: 10px; background: #2d2d2d; }
        .pass { color: #00ff00; }
        .fail { color: #ff0000; }
        .info { color: #ffff00; }
    </style>
</head>
<body>
    <h1>🔍 QuickServ Diagnostic Tool</h1>
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test ${type}`;
            div.innerHTML = message;
            results.appendChild(div);
        }
        
        // Test 1: Basic JavaScript
        log('✓ JavaScript is working', 'pass');
        
        // Test 2: Fetch API
        log('Testing Backend API...', 'info');
        fetch('http://localhost:8080/api/health')
            .then(res => res.json())
            .then(data => {
                log(`✓ Backend API: ${JSON.stringify(data)}`, 'pass');
            })
            .catch(err => {
                log(`✗ Backend API Error: ${err.message}`, 'fail');
            });
        
        // Test 3: Browser Info
        log(`Browser: ${navigator.userAgent}`, 'info');
        log(`Screen: ${window.screen.width}x${window.screen.height}`, 'info');
        log(`Window: ${window.innerWidth}x${window.innerHeight}`, 'info');
        
        // Test 4: Local Storage
        try {
            localStorage.setItem('test', 'value');
            localStorage.removeItem('test');
            log('✓ LocalStorage is working', 'pass');
        } catch (e) {
            log(`✗ LocalStorage Error: ${e.message}`, 'fail');
        }
        
        // Test 5: Console
        console.log('QuickServ Diagnostic: All tests running');
        log('✓ Console is working (check browser console)', 'pass');
        
        // Test 6: Try to load main app
        log('<br><a href="/" style="color: #00ffff; font-size: 18px;">← Click here to go to Main App</a>', 'info');
        
        // Test 7: Network test
        log('<br>If main app doesn\'t load, check:', 'info');
        log('1. Browser console (F12) for errors', 'info');
        log('2. Network tab (F12) for failed requests', 'info');
        log('3. Try: http://127.0.0.1:5173', 'info');
        log('4. Try: http://192.168.1.2:5173', 'info');
    </script>
</body>
</html>
